services:
  - type: web
    name: ridex
    runtime: node
    plan: free
    buildCommand: cd frontend && yarn install --frozen-lockfile && yarn build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
